<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Collection de 2€ - Expert Cloud</title>
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/5/53/2_euro_common_face.png">
  <style>
    /* --- STYLE GÉNÉRAL --- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; min-height: 100vh; }
    
    header { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 25px; text-align: center; border-bottom: 2px solid rgba(255,215,0,0.2); }
    header h1 { font-size: 2.2rem; color: gold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    
    .login-container, .main-container { width: 95%; max-width: 1200px; margin: 25px auto; background: rgba(255,255,255,0.08); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h2 { margin-bottom: 20px; color: gold; border-left: 4px solid gold; padding-left: 15px; }

    /* --- FORMULAIRES & INPUTS --- */
    input, textarea, select { 
      width: 100%; padding: 12px 15px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,215,0,0.3); 
      background: rgba(15, 23, 42, 0.8); color: white; font-weight: 500; outline: none; transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus { border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
    select option { background: #1e293b; color: white; }
    
    button { padding: 12px 24px; border: none; border-radius: 10px; background: gold; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
    .logout-btn { background: #ef4444; color: white; margin-bottom: 20px; }

    /* --- GRILLE --- */
    .pieces-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
    .piece-card { background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .piece-card:hover { transform: scale(1.05) rotate(1deg); border-color: gold; z-index: 10; }
    .piece-card img { width: 100%; height: 160px; object-fit: cover; background: #000; }
    .piece-content { padding: 12px; font-size: 0.9rem; }
    .piece-content h3 { color: gold; font-size: 1.1rem; margin-bottom: 5px; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 8px; background: rgba(255,215,0,0.15); color: gold; font-size: 0.75rem; margin-top: 5px; border: 1px solid gold; }
    
    .action-buttons { display: flex; gap: 8px; margin-top: 10px; }
    .action-buttons button { padding: 6px; font-size: 0.8rem; flex: 1; }

    /* --- MODALE --- */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
    .modal-content { background: #0f172a; border: 2px solid gold; border-radius: 20px; width: 90%; max-width: 800px; position: relative; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; animation: modalScaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes modalScaleUp { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .close-modal { 
        position: absolute; top: 15px; right: 20px; font-size: 2.2rem; line-height: 0; color: gold; cursor: pointer; z-index: 2100; font-weight: bold; background: rgba(0,0,0,0.6); 
        width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; border: 1px solid rgba(255,215,0,0.3);
    }
    .close-modal:hover { transform: rotate(90deg) scale(1.1); background: rgba(255,215,0,0.2); }
    .close-modal span { position: relative; top: -2px; }

    .modal-img-container { width: 100%; background: #000; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255,215,0,0.2); }
    .modal-img-container img { max-width: 100%; max-height: 60vh; object-fit: contain; animation: imgPop 0.6s ease-out; }
    @keyframes imgPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-body { padding: 20px; overflow-y: auto; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>🪙 Ma Collection de Pièces de 2€</h1>
</header>

<div class="login-container" id="loginPage">
  <h2>Accès Administrateur</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Mot de passe">
  <button id="btnConnect" style="width: 100%;">Se connecter</button>
</div>

<div class="main-container hidden" id="adminView">
  <button onclick="auth.signOut()" class="logout-btn">Déconnexion</button>
  <h2 id="formTitle">➕ Ajouter une pièce</h2>
  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:10px;">
    <input type="text" id="pID" placeholder="ID (ex: FRA-2024-JO)">
    <select id="pCountry">
      <option value="">Sélectionner le Pays</option>
      <option>Allemagne</option><option>Andorre</option><option>Autriche</option>
      <option>Belgique</option><option>Chypre</option><option>Croatie</option>
      <option>Espagne</option><option>Estonie</option><option>Finlande</option>
      <option>France</option><option>Grèce</option><option>Irlande</option>
      <option>Italie</option><option>Lettonie</option><option>Lituanie</option>
      <option>Luxembourg</option><option>Malte</option><option>Monaco</option>
      <option>Pays-Bas</option><option>Portugal</option><option>Saint-Marin</option>
      <option>Slovaquie</option><option>Slovénie</option><option>Vatican</option>
    </select>
    <select id="pYear"><option value="">Année</option></select>
    <select id="pWorkshop">
      <option value="Aucun">Atelier (Aucun)</option>
      <option>A (Berlin)</option><option>D (Munich)</option>
      <option>F (Stuttgart)</option><option>G (Karlsruhe)</option>
      <option>J (Hambourg)</option>
    </select>
    <select id="pCondition">
      <option value="Non spécifié">État de la pièce</option>
      <option>BE (Belle Épreuve)</option>
      <option>BU (Brillant Universel)</option>
      <option>SPL (Splendide)</option>
      <option>AU (Presque Splendide)</option>
      <option>TTB (Très Très Beau)</option>
      <option>TB (Très Beau)</option>
      <option>B (Beau)</option>
      <option>AB (Assez Beau)</option>
      <option>P (Passable)</option>
    </select>
    <input type="number" id="pValue" placeholder="Valeur estimée (€)">
    <input type="number" id="pQty" placeholder="Quantité">
    <input type="date" id="pDate">
    <input type="text" id="pImage" placeholder="Lien URL de l'image">
  </div>
  <textarea id="pDesc" placeholder="Description..."></textarea>
  <button id="btnSave" style="width: 100%; margin-top: 15px;">💾 Enregistrer</button>
  <button id="btnCancel" class="hidden" style="width: 100%; background: #64748b; margin-top: 5px;">Annuler</button>
</div>

<div class="main-container">
  <h2>🔍 Rechercher & Explorer</h2>
  <input type="text" id="searchInput" placeholder="Rechercher...">
  <div class="pieces-grid" id="containerPieces"></div>
</div>

<div class="modal" id="pieceModal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()"><span>×</span></span>
    <div class="modal-img-container">
      <img id="modalImg" src="">
    </div>
    <div class="modal-body">
      <h2 id="modalTitle" style="color: gold;"></h2>
      <div id="modalDetails"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCbAwyNnpevNoRl80nPnsAZMknVrv36RUg",
  authDomain: "macollection2euros.firebaseapp.com",
  projectId: "macollection2euros",
  storageBucket: "macollection2euros.firebasestorage.app",
  messagingSenderId: "375286857328",
  appId: "1:375286857328:web:599da47e8ebcdeee0b3eb5",
  measurementId: "G-JQY0Z9XWTF"
};

  const app = initializeApp(firebaseConfig);
  const auth = window.auth = getAuth(app);
  const db = getFirestore(app);

  let allPieces = [];
  let editingId = null;

  const ySel = document.getElementById('pYear');
  for(let y=1999; y<=2050; y++) { let o=document.createElement('option'); o.value=y; o.text=y; ySel.add(o); }

  async function loadData() {
    try {
        const snap = await getDocs(query(collection(db, "pieces"), orderBy("year", "desc")));
        allPieces = snap.docs.map(d => ({ fireId: d.id, ...d.data() }));
        render();
    } catch(e) { console.error(e); }
  }

  function render(f = "") {
    const cont = document.getElementById('containerPieces');
    cont.innerHTML = "";
    const isAdmin = !document.getElementById('adminView').classList.contains('hidden');
    const filtered = allPieces.filter(p => p.country.toLowerCase().includes(f.toLowerCase()) || p.year.toString().includes(f) || p.customID.toLowerCase().includes(f.toLowerCase()));

    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = "piece-card";
      card.innerHTML = `
        <img src="${p.image || 'https://upload.wikimedia.org/wikipedia/commons/5/53/2_euro_common_face.png'}">
        <div class="piece-content">
          <h3>${p.country} - ${p.year}</h3>
          <p><strong>ID:</strong> ${p.customID}</p>
          <div class="status-badge">${p.condition || 'Circulée'}</div>
          ${isAdmin ? `<div class="action-buttons">
            <button onclick="prepareEdit('${p.fireId}')" style="background:#3b82f6; color:white">Modifier</button>
            <button onclick="deleteP('${p.fireId}')" style="background:#ef4444; color:white">Supprimer</button>
          </div>` : ''}
        </div>`;
      card.onclick = (e) => { if(e.target.tagName !== 'BUTTON') openModal(p); };
      cont.appendChild(card);
    });
  }

  document.getElementById('btnSave').onclick = async () => {
    const d = { 
        customID: document.getElementById('pID').value, country: document.getElementById('pCountry').value, 
        year: document.getElementById('pYear').value, workshop: document.getElementById('pWorkshop').value,
        condition: document.getElementById('pCondition').value, value: document.getElementById('pValue').value, 
        quantity: document.getElementById('pQty').value, dateFound: document.getElementById('pDate').value, 
        image: document.getElementById('pImage').value, description: document.getElementById('pDesc').value 
    };
    if(!d.customID || !d.country) return alert("ID et Pays requis");
    if(editingId) { await updateDoc(doc(db, "pieces", editingId), d); editingId = null; } 
    else { await addDoc(collection(db, "pieces"), d); }
    resetForm(); loadData();
  };

  window.deleteP = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "pieces", id)); loadData(); } };
  
  window.prepareEdit = (id) => {
    const p = allPieces.find(i => i.fireId === id); 
    editingId = id;
    document.getElementById('pID').value = p.customID; document.getElementById('pCountry').value = p.country;
    document.getElementById('pYear').value = p.year; document.getElementById('pWorkshop').value = p.workshop;
    document.getElementById('pCondition').value = p.condition || "Non spécifié";
    document.getElementById('pValue').value = p.value; document.getElementById('pQty').value = p.quantity;
    document.getElementById('pDate').value = p.dateFound; document.getElementById('pImage').value = p.image;
    document.getElementById('pDesc').value = p.description;
    document.getElementById('formTitle').innerText = "💾 Modification";
    document.getElementById('btnCancel').classList.remove('hidden');
    document.getElementById('adminView').scrollIntoView({behavior: "smooth"});
  };

  document.getElementById('btnConnect').onclick = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } 
    catch(e) { alert("Accès refusé"); }
  };

  onAuthStateChanged(auth, (u) => {
    document.getElementById('adminView').classList.toggle('hidden', !u);
    document.getElementById('loginPage').classList.toggle('hidden', !!u);
    loadData();
  });

  document.getElementById('searchInput').onkeyup = (e) => render(e.target.value);

  window.openModal = (p) => {
    document.getElementById('modalImg').src = p.image || 'https://upload.wikimedia.org/wikipedia/commons/5/53/2_euro_common_face.png';
    document.getElementById('modalTitle').innerText = `${p.country} (${p.year})`;
    document.getElementById('modalDetails').innerHTML = `
      <p><strong>ID Unique :</strong> ${p.customID}</p>
      <p><strong>État :</strong> ${p.condition || 'Non spécifié'}</p>
      <p><strong>Atelier :</strong> ${p.workshop}</p>
      <p><strong>Valeur :</strong> ${p.value} €</p>
      <p><strong>Quantité :</strong> ${p.quantity}</p>
      <p style="margin-top:15px; border-top: 1px solid #334155; padding-top:10px;">${p.description || 'Pas de description.'}</p>
    `;
    document.getElementById('pieceModal').style.display = "flex";
  };

  window.closeModal = () => document.getElementById('pieceModal').style.display = "none";
  function resetForm() { document.querySelectorAll('#adminView input, #adminView select, #adminView textarea').forEach(i => i.value=""); }
</script>
</body>
</html>
